<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポストイットバースト</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: sans-serif;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .ui {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 10;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: bold;
      background: white;
      color: #111;
      cursor: pointer;
    }

    .status {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
    }

    .frame {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 140px;
      height: 140px;
      transform: translate(-50%, -50%);
      border: 3px solid white;
      border-radius: 18px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.18);
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <video id="video" autoplay playsinline muted></video>

  <div class="frame"></div>

  <div class="ui">
    <button id="startButton">カメラ開始</button>
    <div class="status" id="status">待機中</div>
  </div>

  <script>
    const video = document.getElementById("video");
    const startButton = document.getElementById("startButton");
    const status = document.getElementById("status");

    startButton.addEventListener("click", async () => {
      try {
        status.textContent = "カメラ起動中...";

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment"
          },
          audio: false
        });

        video.srcObject = stream;
        status.textContent = "カメラ起動成功";
        startButton.style.display = "none";

      } catch (error) {
        console.error(error);
        status.textContent = "カメラを起動できませんでした";
      }
    });
  </script>
</body>
</html>
