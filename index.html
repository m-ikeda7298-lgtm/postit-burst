<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポストイットバースト</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: sans-serif;
      touch-action: manipulation;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
      pointer-events: none;
    }

    #effectCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
    }

    #sampleCanvas {
      display: none;
    }

    .title {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 30;
      padding: 8px 11px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      font-weight: bold;
      font-size: 13px;
      letter-spacing: 0.04em;
      pointer-events: none;
    }

    .frames {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 6;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 0;
      pointer-events: none;
    }

    .frame {
      position: relative;
      width: clamp(42px, 15vw, 78px);
      height: clamp(42px, 15vw, 78px);
      border: 2px solid rgba(255, 255, 255, 0.95);
      box-sizing: border-box;
      pointer-events: none;
    }

    .frameLabel {
      position: absolute;
      left: 4px;
      top: 3px;
      padding: 1px 4px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      font-size: 9px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .guide {
      position: fixed;
      left: 50%;
      top: calc(50% + 175px);
      transform: translateX(-50%);
      z-index: 7;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.5);
      font-size: 11px;
      white-space: nowrap;
      pointer-events: none;
    }

    .ui {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: 8px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 8px;
      align-items: center;
      z-index: 50;
      pointer-events: none;
    }

    .previewWrap {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      align-items: center;
    }

    .colorPreview {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 1.5px solid white;
      background: #333;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.35);
      flex: 0 0 auto;
    }

    .status {
      padding: 5px 7px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      font-size: 9px;
      line-height: 1.35;
      max-height: 44px;
      overflow: hidden;
      word-break: keep-all;
    }

    .startOverlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    .startPanel {
      width: min(88vw, 430px);
      padding: 28px 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.13);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.24);
      pointer-events: auto;
    }

    .startPanel h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .startPanel p {
      margin: 0 0 22px;
      color: rgba(255, 255, 255, 0.84);
      line-height: 1.6;
      font-size: 15px;
    }

    #startButton {
      position: relative;
      z-index: 10000;
      border: none;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 18px;
      font-weight: bold;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      min-width: 180px;
    }

    #startButton:active {
      transform: scale(0.97);
    }

    #startButton:disabled {
      opacity: 0.7;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .frame {
        width: 58px;
        height: 58px;
      }

      .guide {
        top: calc(50% + 128px);
        font-size: 10px;
      }

      .status {
        font-size: 8px;
        max-height: 38px;
      }

      .colorPreview {
        width: 13px;
        height: 13px;
      }
    }
  </style>
</head>

<body>
  <video id="video" autoplay playsinline muted></video>

  <canvas id="sampleCanvas"></canvas>
  <canvas id="effectCanvas"></canvas>

  <div class="title">Post-it Burst</div>

  <div class="frames">
    <div class="frame" id="frame1"><div class="frameLabel">1</div></div>
    <div class="frame" id="frame2"><div class="frameLabel">2</div></div>
    <div class="frame" id="frame3"><div class="frameLabel">3</div></div>
    <div class="frame" id="frame4"><div class="frameLabel">4</div></div>

    <div class="frame" id="frame5"><div class="frameLabel">5</div></div>
    <div class="frame" id="frame6"><div class="frameLabel">6</div></div>
    <div class="frame" id="frame7"><div class="frameLabel">7</div></div>
    <div class="frame" id="frame8"><div class="frameLabel">8</div></div>

    <div class="frame" id="frame9"><div class="frameLabel">9</div></div>
    <div class="frame" id="frame10"><div class="frameLabel">10</div></div>
    <div class="frame" id="frame11"><div class="frameLabel">11</div></div>
    <div class="frame" id="frame12"><div class="frameLabel">12</div></div>

    <div class="frame" id="frame13"><div class="frameLabel">13</div></div>
    <div class="frame" id="frame14"><div class="frameLabel">14</div></div>
    <div class="frame" id="frame15"><div class="frameLabel">15</div></div>
    <div class="frame" id="frame16"><div class="frameLabel">16</div></div>
  </div>

  <div class="guide">4×4の白枠に付箋を並べてください</div>

  <div class="startOverlay" id="startOverlay">
    <div class="startPanel">
      <h1>Post-it Burst</h1>
      <p>
        16個の認識範囲で付箋の色を読み取り、<br />
        それぞれの白枠の中央から色がはじけます。<br />
        ボタン、またはこの画面をタップしてください。
      </p>
      <button id="startButton" type="button">カメラ開始</button>
    </div>
  </div>

  <div class="ui">
    <div class="previewWrap">
      <div class="colorPreview" id="colorPreview1"></div>
      <div class="colorPreview" id="colorPreview2"></div>
      <div class="colorPreview" id="colorPreview3"></div>
      <div class="colorPreview" id="colorPreview4"></div>
      <div class="colorPreview" id="colorPreview5"></div>
      <div class="colorPreview" id="colorPreview6"></div>
      <div class="colorPreview" id="colorPreview7"></div>
      <div class="colorPreview" id="colorPreview8"></div>
      <div class="colorPreview" id="colorPreview9"></div>
      <div class="colorPreview" id="colorPreview10"></div>
      <div class="colorPreview" id="colorPreview11"></div>
      <div class="colorPreview" id="colorPreview12"></div>
      <div class="colorPreview" id="colorPreview13"></div>
      <div class="colorPreview" id="colorPreview14"></div>
      <div class="colorPreview" id="colorPreview15"></div>
      <div class="colorPreview" id="colorPreview16"></div>
    </div>
    <div class="status" id="status">待機中</div>
  </div>

  <script>
    const video = document.getElementById("video");

    const sampleCanvas = document.getElementById("sampleCanvas");
    const sampleCtx = sampleCanvas.getContext("2d", {
      willReadFrequently: true
    });

    const effectCanvas = document.getElementById("effectCanvas");
    const effectCtx = effectCanvas.getContext("2d");

    const startButton = document.getElementById("startButton");
    const startOverlay = document.getElementById("startOverlay");
    const status = document.getElementById("status");

    const zones = [];

    for (let i = 1; i <= 16; i++) {
      zones.push({
        label: String(i),
        frame: document.getElementById(`frame${i}`),
        preview: document.getElementById(`colorPreview${i}`),
        lastColorName: "不明",
        lastBurstTime: 0
      });
    }

    let cameraStarted = false;
    let loopStarted = false;
    let particles = [];

    const BURST_INTERVAL_MS = 3000;

    function resizeEffectCanvas() {
      effectCanvas.width = window.innerWidth * window.devicePixelRatio;
      effectCanvas.height = window.innerHeight * window.devicePixelRatio;

      effectCtx.setTransform(
        window.devicePixelRatio,
        0,
        0,
        window.devicePixelRatio,
        0,
        0
      );
    }

    window.addEventListener("resize", resizeEffectCanvas);
    resizeEffectCanvas();

    async function startCamera() {
      if (cameraStarted) {
        return;
      }

      try {
        status.textContent = "カメラ起動中...";
        startButton.disabled = true;
        startButton.textContent = "起動中...";

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        cameraStarted = true;

        status.textContent = "色認識中";
        startOverlay.classList.add("hidden");

        if (!loopStarted) {
          loopStarted = true;
          requestAnimationFrame(loop);
        }
      } catch (error) {
        console.error(error);
        status.textContent = "カメラを起動できませんでした";
        startButton.disabled = false;
        startButton.textContent = "もう一度試す";
      }
    }

    startButton.addEventListener("click", function(event) {
      event.preventDefault();
      startCamera();
    });

    startButton.addEventListener("pointerup", function(event) {
      event.preventDefault();
      startCamera();
    });

    startOverlay.addEventListener("pointerup", function(event) {
      event.preventDefault();
      startCamera();
    });

    function loop() {
      if (cameraStarted) {
        detectAllZones();
      }

      updateParticles();
      requestAnimationFrame(loop);
    }

    function detectAllZones() {
      if (!video.videoWidth || !video.videoHeight) {
        return;
      }

      const results = [];

      for (const zone of zones) {
        const detection = detectZoneColor(zone);

        maybeBurst(zone, detection.result, detection.screenCenter);

        zone.preview.style.background = `rgb(${detection.r}, ${detection.g}, ${detection.b})`;

        results.push(`${zone.label}:${shortColorName(detection.result.name)}`);
      }

      status.textContent = results.join(" ");
      status.style.background = "rgba(0, 0, 0, 0.55)";
    }

    function shortColorName(name) {
      if (name === "ピンク / 赤") {
        return "桃";
      }

      if (name === "オレンジ") {
        return "橙";
      }

      if (name === "黄色") {
        return "黄";
      }

      if (name === "緑") {
        return "緑";
      }

      if (name === "青") {
        return "青";
      }

      if (name === "紫") {
        return "紫";
      }

      return "不";
    }

    function getFrameScreenCenter(frameElement) {
      const rect = frameElement.getBoundingClientRect();

      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2,
        width: rect.width,
        height: rect.height
      };
    }

    function getVideoMapping() {
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;

      const videoWidth = video.videoWidth;
      const videoHeight = video.videoHeight;

      const scale = Math.max(
        viewportWidth / videoWidth,
        viewportHeight / videoHeight
      );

      const displayedVideoWidth = videoWidth * scale;
      const displayedVideoHeight = videoHeight * scale;

      const offsetX = (viewportWidth - displayedVideoWidth) / 2;
      const offsetY = (viewportHeight - displayedVideoHeight) / 2;

      return {
        scale,
        offsetX,
        offsetY,
        videoWidth,
        videoHeight
      };
    }

    function screenPointToVideoPoint(screenX, screenY) {
      const mapping = getVideoMapping();

      let videoX = (screenX - mapping.offsetX) / mapping.scale;
      let videoY = (screenY - mapping.offsetY) / mapping.scale;

      videoX = Math.max(0, Math.min(mapping.videoWidth, videoX));
      videoY = Math.max(0, Math.min(mapping.videoHeight, videoY));

      return {
        x: videoX,
        y: videoY,
        scale: mapping.scale
      };
    }

    function detectZoneColor(zone) {
      const screenCenter = getFrameScreenCenter(zone.frame);
      const videoPoint = screenPointToVideoPoint(screenCenter.x, screenCenter.y);

      const screenSampleSize = Math.min(screenCenter.width, screenCenter.height) * 0.7;
      const videoSampleSize = Math.max(
        20,
        Math.round(screenSampleSize / videoPoint.scale)
      );

      sampleCanvas.width = videoSampleSize;
      sampleCanvas.height = videoSampleSize;

      const sourceX = videoPoint.x - videoSampleSize / 2;
      const sourceY = videoPoint.y - videoSampleSize / 2;

      sampleCtx.drawImage(
        video,
        sourceX,
        sourceY,
        videoSampleSize,
        videoSampleSize,
        0,
        0,
        videoSampleSize,
        videoSampleSize
      );

      const imageData = sampleCtx.getImageData(0, 0, videoSampleSize, videoSampleSize);
      const data = imageData.data;

      let r = 0;
      let g = 0;
      let b = 0;
      let count = 0;

      for (let i = 0; i < data.length; i += 16) {
        r += data[i];
        g += data[i + 1];
        b += data[i + 2];
        count++;
      }

      r = Math.round(r / count);
      g = Math.round(g / count);
      b = Math.round(b / count);

      return {
        r,
        g,
        b,
        screenCenter,
        result: classifyColor(r, g, b)
      };
    }

    function maybeBurst(zone, result, screenCenter) {
      const now = Date.now();

      if (result.name === "不明") {
        zone.lastColorName = "不明";
        return;
      }

      const colorChanged = result.name !== zone.lastColorName;
      const intervalPassed = now - zone.lastBurstTime >= BURST_INTERVAL_MS;

      if (colorChanged || intervalPassed) {
        createBurst(
          result.particleColor,
          result.motionType,
          screenCenter.x,
          screenCenter.y
        );

        zone.lastBurstTime = now;
      }

      zone.lastColorName = result.name;
    }

    function classifyColor(r, g, b) {
      const hsv = rgbToHsv(r, g, b);
      const h = hsv.h;
      const s = hsv.s;
      const v = hsv.v;

      if (v < 0.25 || s < 0.18) {
        return {
          name: "不明",
          particleColor: "rgb(255, 255, 255)",
          motionType: "none"
        };
      }

      if (h >= 35 && h <= 70) {
        return {
          name: "黄色",
          particleColor: "rgb(255, 230, 50)",
          motionType: "sun"
        };
      }

      if (h >= 15 && h < 35) {
        return {
          name: "オレンジ",
          particleColor: "rgb(255, 145, 45)",
          motionType: "firework"
        };
      }

      if (h >= 330 || h < 15) {
        return {
          name: "ピンク / 赤",
          particleColor: "rgb(255, 85, 160)",
          motionType: "flower"
        };
      }

      if (h >= 80 && h <= 160) {
        return {
          name: "緑",
          particleColor: "rgb(80, 230, 120)",
          motionType: "leaf"
        };
      }

      if (h >= 180 && h <= 250) {
        return {
          name: "青",
          particleColor: "rgb(70, 180, 255)",
          motionType: "splash"
        };
      }

      if (h > 250 && h < 330) {
        return {
          name: "紫",
          particleColor: "rgb(190, 110, 255)",
          motionType: "spiral"
        };
      }

      return {
        name: "不明",
        particleColor: "rgb(255, 255, 255)",
        motionType: "none"
      };
    }

    function rgbToHsv(r, g, b) {
      r = r / 255;
      g = g / 255;
      b = b / 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const diff = max - min;

      let h = 0;
      const s = max === 0 ? 0 : diff / max;
      const v = max;

      if (diff !== 0) {
        if (max === r) {
          h = ((g - b) / diff) % 6;
        } else if (max === g) {
          h = (b - r) / diff + 2;
        } else {
          h = (r - g) / diff + 4;
        }

        h = h * 60;

        if (h < 0) {
          h += 360;
        }
      }

      return { h, s, v };
    }

    function createBurst(color, motionType, originX, originY) {
      const centerX = originX;
      const centerY = originY;

      if (motionType === "sun") {
        for (let i = 0; i < 80; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 3 + Math.random() * 8;

          particles.push({
            x: centerX,
            y: centerY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 2 + Math.random() * 7,
            life: 1,
            color: color,
            shape: "circle",
            gravity: 0.02,
            drag: 0.985,
            rotation: 0,
            spin: 0
          });
        }
      }

      if (motionType === "firework") {
        for (let i = 0; i < 95; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 4 + Math.random() * 11;

          particles.push({
            x: centerX,
            y: centerY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 3 + Math.random() * 8,
            life: 1,
            color: color,
            shape: "square",
            gravity: 0.11,
            drag: 0.975,
            rotation: Math.random() * Math.PI,
            spin: -0.15 + Math.random() * 0.3
          });
        }
      }

      if (motionType === "flower") {
        for (let i = 0; i < 70; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 5;

          particles.push({
            x: centerX,
            y: centerY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1.2,
            size: 4 + Math.random() * 9,
            life: 1,
            color: color,
            shape: "petal",
            gravity: 0.035,
            drag: 0.992,
            rotation: Math.random() * Math.PI,
            spin: -0.08 + Math.random() * 0.16
          });
        }
      }

      if (motionType === "leaf") {
        for (let i = 0; i < 65; i++) {
          const angle = -Math.PI / 2 + (-0.9 + Math.random() * 1.8);
          const speed = 1.4 + Math.random() * 4.5;

          particles.push({
            x: centerX,
            y: centerY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 5 + Math.random() * 9,
            life: 1,
            color: color,
            shape: "leaf",
            gravity: -0.005,
            drag: 0.99,
            rotation: Math.random() * Math.PI,
            spin: -0.06 + Math.random() * 0.12
          });
        }
      }

      if (motionType === "splash") {
        for (let i = 0; i < 75; i++) {
          const angle = -Math.PI / 2 + (-0.9 + Math.random() * 1.8);
          const speed = 3 + Math.random() * 9;

          particles.push({
            x: centerX,
            y: centerY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 2 + Math.random() * 6,
            life: 1,
            color: color,
            shape: "drop",
            gravity: 0.16,
            drag: 0.985,
            rotation: Math.random() * Math.PI,
            spin: 0.04
          });
        }
      }

      if (motionType === "spiral") {
        for (let i = 0; i < 80; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 6;

          particles.push({
            x: centerX,
            y: centerY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 3 + Math.random() * 8,
            life: 1,
            color: color,
            shape: "circle",
            gravity: 0.01,
            drag: 0.99,
            rotation: angle,
            spin: 0.12
          });
        }
      }
    }

    function updateParticles() {
      effectCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      const nextParticles = [];

      for (const particle of particles) {
        particle.vx *= particle.drag;
        particle.vy *= particle.drag;

        particle.x += particle.vx;
        particle.y += particle.vy;

        particle.vy += particle.gravity;
        particle.rotation += particle.spin;

        particle.life -= 0.016;

        if (particle.life > 0) {
          nextParticles.push(particle);

          effectCtx.save();
          effectCtx.globalAlpha = Math.max(particle.life, 0);
          effectCtx.fillStyle = particle.color;
          effectCtx.translate(particle.x, particle.y);
          effectCtx.rotate(particle.rotation);

          const size = particle.size * particle.life;

          if (particle.shape === "circle") {
            effectCtx.beginPath();
            effectCtx.arc(0, 0, size, 0, Math.PI * 2);
            effectCtx.fill();
          }

          if (particle.shape === "square") {
            effectCtx.fillRect(-size / 2, -size / 2, size, size);
          }

          if (particle.shape === "petal") {
            effectCtx.beginPath();
            effectCtx.ellipse(
              0,
              0,
              size * 0.65,
              size * 1.25,
              0,
              0,
              Math.PI * 2
            );
            effectCtx.fill();
          }

          if (particle.shape === "leaf") {
            effectCtx.beginPath();
            effectCtx.ellipse(
              0,
              0,
              size * 0.55,
              size * 1.45,
              0,
              0,
              Math.PI * 2
            );
            effectCtx.fill();

            effectCtx.globalAlpha = Math.max(particle.life * 0.45, 0);
            effectCtx.strokeStyle = "rgba(255, 255, 255, 0.8)";
            effectCtx.lineWidth = 1;
            effectCtx.beginPath();
            effectCtx.moveTo(0, -size * 1.1);
            effectCtx.lineTo(0, size * 1.1);
            effectCtx.stroke();
          }

          if (particle.shape === "drop") {
            effectCtx.beginPath();
            effectCtx.ellipse(
              0,
              0,
              size * 0.65,
              size * 1.2,
              0,
              0,
              Math.PI * 2
            );
            effectCtx.fill();
          }

          effectCtx.restore();
        }
      }

      particles = nextParticles;
    }
  </script>
</body>
</html>
