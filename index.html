<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポストイットバースト</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: sans-serif;
      touch-action: manipulation;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
      pointer-events: none;
    }

    #effectCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
    }

    #sampleCanvas {
      display: none;
    }

    .title {
      position: fixed;
      left: 10px;
      top: 10px;
      z-index: 30;
      padding: 6px 9px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      font-weight: bold;
      font-size: 11px;
      letter-spacing: 0.04em;
      pointer-events: none;
    }

    .frames {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(96vw, 960px);
      transform: translate(-50%, -50%);
      z-index: 6;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 0;
      pointer-events: none;
    }

    .frame {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(255, 255, 255, 0.88);
      box-sizing: border-box;
      pointer-events: none;
    }

    .frameLabel {
      position: absolute;
      left: 2px;
      top: 2px;
      padding: 0 2px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.38);
      font-size: 6px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .guide {
      position: fixed;
      left: 50%;
      top: calc(50% + 95px);
      transform: translateX(-50%);
      z-index: 7;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.48);
      font-size: 9px;
      white-space: nowrap;
      pointer-events: none;
    }

    .ui {
      position: fixed;
      left: 6px;
      right: 6px;
      bottom: 6px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 6px;
      align-items: end;
      z-index: 50;
      pointer-events: none;
    }

    .previewWrap {
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 1px;
      width: 92px;
    }

    .colorPreview {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #333;
      box-shadow: 0 0 2px rgba(0, 0, 0, 0.35);
    }

    .status {
      padding: 3px 5px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.52);
      backdrop-filter: blur(8px);
      font-size: 6px;
      line-height: 1.15;
      max-height: 30px;
      overflow: hidden;
      letter-spacing: 0.02em;
    }

    .startOverlay {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(8px);
      pointer-events: auto;
      touch-action: manipulation;
    }

    .startPanel {
      width: min(88vw, 430px);
      padding: 28px 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.14);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.26);
      pointer-events: auto;
      touch-action: manipulation;
    }

    .startPanel h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .startPanel p {
      margin: 0 0 22px;
      color: rgba(255, 255, 255, 0.84);
      line-height: 1.6;
      font-size: 15px;
    }

    #startButton {
      position: relative;
      z-index: 2147483647;
      border: none;
      border-radius: 999px;
      padding: 18px 32px;
      font-size: 18px;
      font-weight: bold;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      pointer-events: auto;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      min-width: 190px;
    }

    #startButton:active {
      transform: scale(0.97);
    }

    #startButton:disabled {
      opacity: 0.7;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .frames {
        width: 98vw;
      }

      .guide {
        top: calc(50% + 72px);
        font-size: 8px;
      }

      .status {
        font-size: 5px;
        max-height: 24px;
      }

      .previewWrap {
        width: 78px;
      }

      .colorPreview {
        width: 3px;
        height: 3px;
      }
    }
  </style>
</head>

<body>
  <video id="video" autoplay playsinline muted></video>

  <canvas id="sampleCanvas"></canvas>
  <canvas id="effectCanvas"></canvas>

  <div class="title">Post-it Burst</div>

  <div class="frames" id="frames"></div>

  <div class="guide">5×16、80個の認識範囲です</div>

  <div class="startOverlay" id="startOverlay">
    <div class="startPanel" id="startPanel">
      <h1>Post-it Burst</h1>
      <p>
        80個の認識範囲で付箋の色を読み取り、<br />
        それぞれの白枠の中央から色がはじけます。<br />
        ボタン、またはこの画面をタップしてください。
      </p>
      <button id="startButton" type="button">カメラ開始</button>
    </div>
  </div>

  <div class="ui">
    <div class="previewWrap" id="previewWrap"></div>
    <div class="status" id="status">待機中</div>
  </div>

  <script>
    const video = document.getElementById("video");

    const sampleCanvas = document.getElementById("sampleCanvas");
    const sampleCtx = sampleCanvas.getContext("2d", {
      willReadFrequently: true
    });

    const effectCanvas = document.getElementById("effectCanvas");
    const effectCtx = effectCanvas.getContext("2d");

    const startButton = document.getElementById("startButton");
    const startOverlay = document.getElementById("startOverlay");
    const startPanel = document.getElementById("startPanel");
    const status = document.getElementById("status");
    const framesElement = document.getElementById("frames");
    const previewWrap = document.getElementById("previewWrap");

    const ROWS = 5;
    const COLS = 16;
    const ZONE_COUNT = ROWS * COLS;

    // 爆発間隔：3秒 → 1.5秒
    const BURST_INTERVAL_MS = 1500;

    // 80個あるので、認識処理は少し間隔を空ける
    const DETECTION_INTERVAL_MS = 140;

    let cameraStarted = false;
    let cameraStarting = false;
    let loopStarted = false;
    let particles = [];
    let lastDetectionTime = 0;

    const zones = [];

    for (let i = 1; i <= ZONE_COUNT; i++) {
      const frame = document.createElement("div");
      frame.className = "frame";
      frame.id = `frame${i}`;

      const label = document.createElement("div");
      label.className = "frameLabel";
      label.textContent = String(i);

      frame.appendChild(label);
      framesElement.appendChild(frame);

      const preview = document.createElement("div");
      preview.className = "colorPreview";
      preview.id = `colorPreview${i}`;
      previewWrap.appendChild(preview);

      zones.push({
        label: String(i),
        frame,
        preview,
        lastColorName: "不明",
        lastBurstTime: 0,
        latestShortName: "・"
      });
    }

    function resizeEffectCanvas() {
      effectCanvas.width = window.innerWidth * window.devicePixelRatio;
      effectCanvas.height = window.innerHeight * window.devicePixelRatio;

      effectCtx.setTransform(
        window.devicePixelRatio,
        0,
        0,
        window.devicePixelRatio,
        0,
        0
      );
    }

    window.addEventListener("resize", resizeEffectCanvas);
    resizeEffectCanvas();

    function requestStartCamera(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      startCamera();
    }

    async function startCamera() {
      if (cameraStarted || cameraStarting) {
        return;
      }

      cameraStarting = true;

      try {
        status.textContent = "カメラ起動中...";
        startButton.disabled = true;
        startButton.textContent = "起動中...";

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        cameraStarted = true;

        status.textContent = "色認識中";
        startOverlay.classList.add("hidden");

        if (!loopStarted) {
          loopStarted = true;
          requestAnimationFrame(loop);
        }
      } catch (error) {
        console.error(error);
        status.textContent = "カメラを起動できませんでした";
        startButton.disabled = false;
        startButton.textContent = "もう一度試す";
      } finally {
        cameraStarting = false;
      }
    }

    startButton.onclick = requestStartCamera;
    startButton.onpointerdown = requestStartCamera;
    startButton.onpointerup = requestStartCamera;
    startButton.ontouchstart = requestStartCamera;
    startButton.ontouchend = requestStartCamera;

    startPanel.onclick = requestStartCamera;
    startPanel.onpointerdown = requestStartCamera;
    startPanel.ontouchstart = requestStartCamera;

    startOverlay.onclick = requestStartCamera;
    startOverlay.onpointerdown = requestStartCamera;
    startOverlay.ontouchstart = requestStartCamera;

    function loop(timestamp) {
      if (cameraStarted && timestamp - lastDetectionTime >= DETECTION_INTERVAL_MS) {
        detectAllZones();
        lastDetectionTime = timestamp;
      }

      updateParticles();
      requestAnimationFrame(loop);
    }

    function detectAllZones() {
      if (!video.videoWidth || !video.videoHeight) {
        return;
      }

      for (const zone of zones) {
        const detection = detectZoneColor(zone);

        maybeBurst(zone, detection.result, detection.screenCenter);

        zone.preview.style.background = `rgb(${detection.r}, ${detection.g}, ${detection.b})`;
        zone.latestShortName = shortColorName(detection.result.name);
      }

      renderStatus();
    }

    function renderStatus() {
      const rows = [];

      for (let row = 0; row < ROWS; row++) {
        const start = row * COLS;
        const end = start + COLS;
        const rowText = zones
          .slice(start, end)
          .map(function(zone) {
            return zone.latestShortName;
          })
          .join("");

        rows.push(rowText);
      }

      status.innerHTML = rows.join("<br>");
      status.style.background = "rgba(0, 0, 0, 0.52)";
    }

    function shortColorName(name) {
      if (name === "ピンク / 赤") return "桃";
      if (name === "オレンジ") return "橙";
      if (name === "黄色") return "黄";
      if (name === "緑") return "緑";
      if (name === "青") return "青";
      if (name === "紫") return "紫";
      return "・";
    }

    function getFrameScreenCenter(frameElement) {
      const rect = frameElement.getBoundingClientRect();

      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2,
        width: rect.width,
        height: rect.height
      };
    }

    function getVideoMapping() {
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;

      const videoWidth = video.videoWidth;
      const videoHeight = video.videoHeight;

      const scale = Math.max(
        viewportWidth / videoWidth,
        viewportHeight / videoHeight
      );

      const displayedVideoWidth = videoWidth * scale;
      const displayedVideoHeight = videoHeight * scale;

      const offsetX = (viewportWidth - displayedVideoWidth) / 2;
      const offsetY = (viewportHeight - displayedVideoHeight) / 2;

      return {
        scale,
        offsetX,
        offsetY,
        videoWidth,
        videoHeight
      };
    }

    function screenPointToVideoPoint(screenX, screenY) {
      const mapping = getVideoMapping();

      let videoX = (screenX - mapping.offsetX) / mapping.scale;
      let videoY = (screenY - mapping.offsetY) / mapping.scale;

      videoX = Math.max(0, Math.min(mapping.videoWidth, videoX));
      videoY = Math.max(0, Math.min(mapping.videoHeight, videoY));

      return {
        x: videoX,
        y: videoY,
        scale: mapping.scale
      };
    }

    function detectZoneColor(zone) {
      const screenCenter = getFrameScreenCenter(zone.frame);
      const videoPoint = screenPointToVideoPoint(screenCenter.x, screenCenter.y);

      const screenSampleSize = Math.min(screenCenter.width, screenCenter.height) * 0.72;
      const videoSampleSize = Math.max(
        10,
        Math.round(screenSampleSize / videoPoint.scale)
      );

      sampleCanvas.width = videoSampleSize;
      sampleCanvas.height = videoSampleSize;

      const sourceX = videoPoint.x - videoSampleSize / 2;
      const sourceY = videoPoint.y - videoSampleSize / 2;

      sampleCtx.drawImage(
        video,
        sourceX,
        sourceY,
        videoSampleSize,
        videoSampleSize,
        0,
        0,
        videoSampleSize,
        videoSampleSize
      );

      const imageData = sampleCtx.getImageData(0, 0, videoSampleSize, videoSampleSize);
      const dominant = getDominantColor(imageData.data);

      return {
        r: dominant.r,
        g: dominant.g,
        b: dominant.b,
        screenCenter,
        result: classifyColor(dominant.r, dominant.g, dominant.b)
      };
    }

    // 色認識精度改善：
    // 全ピクセル平均ではなく、色味の強いピクセルを優先して平均する
    function getDominantColor(data) {
      let weightedR = 0;
      let weightedG = 0;
      let weightedB = 0;
      let totalWeight = 0;

      let fallbackR = 0;
      let fallbackG = 0;
      let fallbackB = 0;
      let fallbackCount = 0;

      for (let i = 0; i < data.length; i += 16) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        const hsv = rgbToHsv(r, g, b);
        const s = hsv.s;
        const v = hsv.v;

        fallbackR += r;
        fallbackG += g;
        fallbackB += b;
        fallbackCount++;

        // 暗い場所・明るい場所でも色を拾いやすくするため、条件を緩める
        if (v > 0.12 && s > 0.08) {
          const weight = 0.35 + s * 1.8 + v * 0.45;

          weightedR += r * weight;
          weightedG += g * weight;
          weightedB += b * weight;
          totalWeight += weight;
        }
      }

      if (totalWeight > 0) {
        return {
          r: Math.round(weightedR / totalWeight),
          g: Math.round(weightedG / totalWeight),
          b: Math.round(weightedB / totalWeight)
        };
      }

      return {
        r: Math.round(fallbackR / fallbackCount),
        g: Math.round(fallbackG / fallbackCount),
        b: Math.round(fallbackB / fallbackCount)
      };
    }

    function maybeBurst(zone, result, screenCenter) {
      const now = Date.now();

      if (result.name === "不明") {
        zone.lastColorName = "不明";
        return;
      }

      const colorChanged = result.name !== zone.lastColorName;
      const intervalPassed = now - zone.lastBurstTime >= BURST_INTERVAL_MS;

      if (colorChanged || intervalPassed) {
        createBurst(
          result.particleColor,
          result.motionType,
          screenCenter.x,
          screenCenter.y
        );

        zone.lastBurstTime = now;
      }

      zone.lastColorName = result.name;
    }

    function classifyColor(r, g, b) {
      const hsv = rgbToHsv(r, g, b);
      const h = hsv.h;
      const s = hsv.s;
      const v = hsv.v;

      // 以前よりも「不明」判定を少し緩める
      if (v < 0.10 || s < 0.055) {
        return {
          name: "不明",
          particleColor: "rgb(255, 255, 255)",
          motionType: "none"
        };
      }

      // 判定範囲を少し広めにして、照明差に強くする
      if (h >= 30 && h <= 78) {
        return {
          name: "黄色",
          particleColor: "rgb(255, 230, 50)",
          motionType: "sun"
        };
      }

      if (h >= 10 && h < 30) {
        return {
          name: "オレンジ",
          particleColor: "rgb(255, 145, 45)",
          motionType: "firework"
        };
      }

      if (h >= 318 || h < 10) {
        return {
          name: "ピンク / 赤",
          particleColor: "rgb(255, 85, 160)",
          motionType: "flower"
        };
      }

      if (h >= 72 && h <= 170) {
        return {
          name: "緑",
          particleColor: "rgb(80, 230, 120)",
          motionType: "leaf"
        };
      }

      if (h >= 170 && h <= 255) {
        return {
          name: "青",
          particleColor: "rgb(70, 180, 255)",
          motionType: "splash"
        };
      }

      if (h > 255 && h < 318) {
        return {
          name: "紫",
          particleColor: "rgb(190, 110, 255)",
          motionType: "spiral"
        };
      }

      return {
        name: "不明",
        particleColor: "rgb(255, 255, 255)",
        motionType: "none"
      };
    }

    function rgbToHsv(r, g, b) {
      r = r / 255;
      g = g / 255;
      b = b / 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const diff = max - min;

      let h = 0;
      const s = max === 0 ? 0 : diff / max;
      const v = max;

      if (diff !== 0) {
        if (max === r) {
          h = ((g - b) / diff) % 6;
        } else if (max === g) {
          h = (b - r) / diff + 2;
        } else {
          h = (r - g) / diff + 4;
        }

        h = h * 60;

        if (h < 0) {
          h += 360;
        }
      }

      return { h, s, v };
    }

    function createBurst(color, motionType, originX, originY) {
      const centerX = originX;
      const centerY = originY;

      const configs = {
        sun: {
          count: 22,
          minSpeed: 2.0,
          maxSpeed: 5.4,
          minSize: 1.5,
          maxSize: 4.2,
          gravity: 0.018,
          drag: 0.988,
          shape: "circle"
        },
        firework: {
          count: 26,
          minSpeed: 2.7,
          maxSpeed: 6.4,
          minSize: 2.0,
          maxSize: 4.7,
          gravity: 0.095,
          drag: 0.98,
          shape: "square"
        },
        flower: {
          count: 22,
          minSpeed: 1.3,
          maxSpeed: 4.0,
          minSize: 2.5,
          maxSize: 5.2,
          gravity: 0.028,
          drag: 0.994,
          shape: "petal"
        },
        leaf: {
          count: 20,
          minSpeed: 1.0,
          maxSpeed: 3.5,
          minSize: 3.0,
          maxSize: 5.2,
          gravity: -0.004,
          drag: 0.992,
          shape: "leaf"
        },
        splash: {
          count: 22,
          minSpeed: 2.0,
          maxSpeed: 5.7,
          minSize: 1.5,
          maxSize: 3.8,
          gravity: 0.13,
          drag: 0.988,
          shape: "drop"
        },
        spiral: {
          count: 22,
          minSpeed: 1.4,
          maxSpeed: 4.5,
          minSize: 2.0,
          maxSize: 4.8,
          gravity: 0.008,
          drag: 0.992,
          shape: "circle"
        }
      };

      const config = configs[motionType];

      if (!config) {
        return;
      }

      for (let i = 0; i < config.count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = config.minSpeed + Math.random() * config.maxSpeed;

        particles.push({
          x: centerX,
          y: centerY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: config.minSize + Math.random() * config.maxSize,
          life: 1,
          color: color,
          shape: config.shape,
          gravity: config.gravity,
          drag: config.drag,
          rotation: Math.random() * Math.PI,
          spin: -0.08 + Math.random() * 0.16
        });
      }

      if (particles.length > 2400) {
        particles.splice(0, particles.length - 2400);
      }
    }

    function updateParticles() {
      effectCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      const nextParticles = [];

      for (const particle of particles) {
        particle.vx *= particle.drag;
        particle.vy *= particle.drag;

        particle.x += particle.vx;
        particle.y += particle.vy;

        particle.vy += particle.gravity;
        particle.rotation += particle.spin;

        // エフェクトを長く残すため、減少量を小さくする
        particle.life -= 0.010;

        if (particle.life > 0) {
          nextParticles.push(particle);

          effectCtx.save();
          effectCtx.globalAlpha = Math.max(particle.life, 0);
          effectCtx.fillStyle = particle.color;
          effectCtx.translate(particle.x, particle.y);
          effectCtx.rotate(particle.rotation);

          const size = particle.size * particle.life;

          if (particle.shape === "circle") {
            effectCtx.beginPath();
            effectCtx.arc(0, 0, size, 0, Math.PI * 2);
            effectCtx.fill();
          }

          if (particle.shape === "square") {
            effectCtx.fillRect(-size / 2, -size / 2, size, size);
          }

          if (particle.shape === "petal") {
            effectCtx.beginPath();
            effectCtx.ellipse(
              0,
              0,
              size * 0.65,
              size * 1.25,
              0,
              0,
              Math.PI * 2
            );
            effectCtx.fill();
          }

          if (particle.shape === "leaf") {
            effectCtx.beginPath();
            effectCtx.ellipse(
              0,
              0,
              size * 0.55,
              size * 1.45,
              0,
              0,
              Math.PI * 2
            );
            effectCtx.fill();
          }

          if (particle.shape === "drop") {
            effectCtx.beginPath();
            effectCtx.ellipse(
              0,
              0,
              size * 0.65,
              size * 1.2,
              0,
              0,
              Math.PI * 2
            );
            effectCtx.fill();
          }

          effectCtx.restore();
        }
      }

      particles = nextParticles;
    }
  </script>
</body>
</html>
