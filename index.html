<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポストイットバースト</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: sans-serif;
      touch-action: manipulation;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
      pointer-events: none;
    }

    #effectCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
    }

    #sampleCanvas {
      display: none;
    }

    .title {
      position: fixed;
      left: 10px;
      top: 10px;
      z-index: 30;
      padding: 6px 9px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      font-weight: bold;
      font-size: 11px;
      letter-spacing: 0.04em;
      pointer-events: none;
    }

    .frames {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(96vw, 960px);
      transform: translate(-50%, -50%);
      z-index: 6;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 0;
      pointer-events: none;
    }

    .frame {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(255, 255, 255, 0.88);
      box-sizing: border-box;
      pointer-events: none;
    }

    .frameLabel {
      position: absolute;
      left: 2px;
      top: 2px;
      padding: 0 2px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.38);
      font-size: 6px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .guide {
      position: fixed;
      left: 50%;
      top: calc(50% + 95px);
      transform: translateX(-50%);
      z-index: 7;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.48);
      font-size: 9px;
      white-space: nowrap;
      pointer-events: none;
    }

    .ui {
      position: fixed;
      left: 6px;
      right: 6px;
      bottom: 6px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 6px;
      align-items: end;
      z-index: 50;
      pointer-events: none;
    }

    .previewWrap {
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 1px;
      width: 92px;
    }

    .colorPreview {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #333;
      box-shadow: 0 0 2px rgba(0, 0, 0, 0.35);
    }

    .status {
      padding: 3px 5px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.52);
      backdrop-filter: blur(8px);
      font-size: 6px;
      line-height: 1.15;
      max-height: 30px;
      overflow: hidden;
      letter-spacing: 0.02em;
    }

    .startOverlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    .startPanel {
      width: min(88vw, 430px);
      padding: 28px 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.13);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.24);
      pointer-events: auto;
    }

    .startPanel h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .startPanel p {
      margin: 0 0 22px;
      color: rgba(255, 255, 255, 0.84);
      line-height: 1.6;
      font-size: 15px;
    }

    #startButton {
      position: relative;
      z-index: 10000;
      border: none;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 18px;
      font-weight: bold;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      min-width: 180px;
    }

    #startButton:active {
      transform: scale(0.97);
    }

    #startButton:disabled {
      opacity: 0.7;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .frames {
        width: 98vw;
      }

      .guide {
        top: calc(50% + 72px);
        font-size: 8px;
      }

      .status {
        font-size: 5px;
        max-height: 24px;
      }

      .previewWrap {
        width: 78px;
      }

      .colorPreview {
        width: 3px;
        height: 3px;
      }
    }
  </style>
</head>

<body>
  <video id="video" autoplay playsinline muted></video>

  <canvas id="sampleCanvas"></canvas>
  <canvas id="effectCanvas"></canvas>

  <div class="title">Post-it Burst</div>

  <div class="frames" id="frames"></div>

  <div class="guide">5×16、80個の認識範囲です</div>

  <div class="startOverlay" id="startOverlay">
    <div class="startPanel">
      <h1>Post-it Burst</h1>
      <p>
        80個の認識範囲で付箋の色を読み取り、<br />
        それぞれの白枠の中央から色がはじけます。<br />
        ボタン、またはこの画面をタップしてください。
      </p>
      <button id="startButton" type="button">カメラ開始</button>
    </div>
  </div>

  <div class="ui">
    <div class="previewWrap" id="previewWrap"></div>
    <div class="status" id="status">待機中</div>
  </div>

  <script>
    const video = document.getElementById("video");

    const sampleCanvas = document.getElementById("sampleCanvas");
    const sampleCtx = sampleCanvas.getContext("2d", {
      willReadFrequently: true
    });

    const effectCanvas = document.getElementById("effectCanvas");
    const effectCtx = effectCanvas.getContext("2d");

    const startButton = document.getElementById("startButton");
    const startOverlay = document.getElementById("startOverlay");
    const status = document.getElementById("status");
    const framesElement = document.getElementById("frames");
    const previewWrap = document.getElementById("previewWrap");

    const ROWS = 5;
    const COLS = 16;
    const ZONE_COUNT = ROWS * COLS;

    const BURST_INTERVAL_MS = 3000;
    const DETECTION_INTERVAL_MS = 160;

    let cameraStarted = false;
    let loopStarted = false;
    let particles = [];
    let lastDetectionTime = 0;

    const zones = [];

    for (let i = 1; i <= ZONE_COUNT; i++) {
      const frame = document.createElement("div");
      frame.className = "frame";
      frame.id = `frame${i}`;

      const label = document.createElement("div");
      label.className = "frameLabel";
      label.textContent = String(i);

      frame.appendChild(label);
      framesElement.appendChild(frame);

      const preview = document.createElement("div");
      preview.className = "colorPreview";
      preview.id = `colorPreview${i}`;
      previewWrap.appendChild(preview);

      zones.push({
        label: String(i),
        frame,
        preview,
        lastColorName: "不明",
        lastBurstTime: 0,
        latestShortName: "不"
      });
    }

    function resizeEffectCanvas() {
      effectCanvas.width = window.innerWidth * window.devicePixelRatio;
      effectCanvas.height = window.innerHeight * window.devicePixelRatio;

      effectCtx.setTransform(
        window.devicePixelRatio,
        0,
        0,
        window.devicePixelRatio,
        0,
        0
      );
    }

    window.addEventListener("resize", resizeEffectCanvas);
    resizeEffectCanvas();

    async function startCamera() {
      if (cameraStarted) {
        return;
      }

      try {
        status.textContent = "カメラ起動中...";
        startButton.disabled = true;
        startButton.textContent = "起動中...";

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        cameraStarted = true;

        status.textContent = "色認識中";
        startOverlay.classList.add("hidden");

        if (!loopStarted) {
          loopStarted = true;
          requestAnimationFrame(loop);
        }
      } catch (error) {
        console.error(error);
        status.textContent = "カメラを起動できませんでした";
        startButton.disabled = false;
        startButton.textContent = "もう一度試す";
      }
    }

    startButton.addEventListener("click", function(event) {
      event.preventDefault();
      startCamera();
    });

    startButton.addEventListener("pointerup", function(event) {
      event.preventDefault();
      startCamera();
    });

    startOverlay.addEventListener("pointerup", function(event) {
      event.preventDefault();
      startCamera();
    });

    function loop(timestamp) {
      if (cameraStarted && timestamp - lastDetectionTime >= DETECTION_INTERVAL_MS) {
        detectAllZones();
        lastDetectionTime = timestamp;
      }

      updateParticles();
      requestAnimationFrame(loop);
    }

    function detectAllZones() {
      if (!video.videoWidth || !video.videoHeight) {
        return;
      }

      for (const zone of zones) {
        const detection = detectZoneColor(zone);

        maybeBurst(zone, detection.result, detection.screenCenter);

        zone.preview.style.background = `rgb(${detection.r}, ${detection.g}, ${detection.b})`;
        zone.latestShortName = shortColorName(detection.result.name);
      }

      renderStatus();
    }

    function renderStatus() {
      const rows = [];

      for (let row = 0; row < ROWS; row++) {
        const start = row * COLS;
        const end = start + COLS;
        const rowText = zones
          .slice(start, end)
          .map(function(zone) {
            return zone.latestShortName;
          })
          .join("");

        rows.push(rowText);
      }

      status.innerHTML = rows.join("<br>");
      status.style.background = "rgba(0, 0, 0, 0.52)";
    }

    function shortColorName(name) {
      if (name === "ピンク / 赤") {
        return "桃";
      }

      if (name === "オレンジ") {
        return "橙";
      }

      if (name === "黄色") {
        return "黄";
      }

      if (name === "緑") {
        return "緑";
      }

      if (name === "青") {
        return "青";
      }

      if (name === "紫") {
        return "紫";
      }

      return "・";
    }

    function getFrameScreenCenter(frameElement) {
      const rect = frameElement.getBoundingClientRect();

      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2,
        width: rect.width,
        height: rect.height
      };
    }

    function getVideoMapping() {
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;

      const videoWidth = video.videoWidth;
      const videoHeight = video.videoHeight;

      const scale = Math.max(
        viewportWidth / videoWidth,
        viewportHeight / videoHeight
      );

      const displayedVideoWidth = videoWidth * scale;
      const displayedVideoHeight = videoHeight * scale;

      const offsetX = (viewportWidth - displayedVideoWidth) / 2;
      const offsetY = (viewportHeight - displayedVideoHeight) / 2;

      return {
        scale,
        offsetX,
        offsetY,
        videoWidth,
        videoHeight
      };
    }

    function screenPointToVideoPoint(screenX, screenY) {
      const mapping = getVideoMapping();

      let videoX = (screenX - mapping.offsetX) / mapping.scale;
      let videoY = (screenY - mapping.offsetY) / mapping.scale;

      videoX = Math.max(0, Math.min(mapping.videoWidth, videoX));
      videoY = Math.max(0, Math.min(mapping.videoHeight, videoY));

      return {
        x: videoX,
        y: videoY,
        scale: mapping.scale
      };
    }

    function detectZoneColor(zone) {
      const screenCenter = getFrameScreenCenter(zone.frame);
      const videoPoint = screenPointToVideoPoint(screenCenter.x, screenCenter.y);

      const screenSampleSize = Math.min(screenCenter.width, screenCenter.height) * 0.62;
      const videoSampleSize = Math.max(
        8,
        Math.round(screenSampleSize / videoPoint.scale)
      );

      sampleCanvas.width = videoSampleSize;
      sampleCanvas.height = videoSampleSize;

      const sourceX = videoPoint.x - videoSampleSize / 2;
      const sourceY = videoPoint.y - videoSampleSize / 2;

      sampleCtx.drawImage(
        video,
        sourceX,
        sourceY,
        videoSampleSize,
        videoSampleSize,
        0,
        0,
        videoSampleSize,
        videoSampleSize
      );

      const imageData = sampleCtx.getImageData(0, 0, videoSampleSize, videoSampleSize);
      const data
